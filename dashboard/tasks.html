<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zero Human Corp — Task Board</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-card: #12121a;
      --bg-card-hover: #1a1a25;
      --border: #1e1e2e;
      --text-primary: #e0e0e8;
      --text-secondary: #8888a0;
      --accent-green: #00ff88;
      --accent-red: #ff4466;
      --accent-yellow: #ffaa00;
      --accent-blue: #4488ff;
      --accent-purple: #aa66ff;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      margin: 0;
      padding: 0;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-green { background: rgba(0,255,136,0.15); color: var(--accent-green); }
    .badge-red { background: rgba(255,68,102,0.15); color: var(--accent-red); }
    .badge-yellow { background: rgba(255,170,0,0.15); color: var(--accent-yellow); }
    .badge-blue { background: rgba(68,136,255,0.15); color: var(--accent-blue); }
    .badge-purple { background: rgba(170,102,255,0.15); color: var(--accent-purple); }
    .badge-dim { background: rgba(136,136,160,0.15); color: var(--text-secondary); }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.on { background: var(--accent-green); }
    .status-dot.off { background: var(--accent-red); }
    .dim { color: var(--text-secondary); }

    /* Kanban layout */
    .kanban {
      display: flex;
      gap: 12px;
      padding: 16px;
      overflow-x: auto;
      min-height: calc(100vh - 120px);
      align-items: flex-start;
    }
    .kanban-column {
      flex: 1;
      min-width: 220px;
      max-width: 320px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
    }
    .kanban-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .kanban-header h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-secondary);
      margin: 0;
    }
    .kanban-count {
      font-size: 11px;
      color: var(--text-secondary);
      background: rgba(136,136,160,0.1);
      padding: 1px 6px;
      border-radius: 3px;
    }
    .kanban-body {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      max-height: calc(100vh - 200px);
    }

    /* Task cards */
    .task-card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .task-card:hover {
      border-color: var(--accent-blue);
    }
    .task-card-title {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .task-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
    }
    .task-card-agent {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .subtask-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .subtask-bar-fill {
      height: 100%;
      background: var(--accent-green);
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }
    .stats-bar .stat {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Filter */
    .filter-bar {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .filter-btn {
      padding: 3px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 10px;
      font-family: inherit;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .filter-btn.active {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      background: rgba(68,136,255,0.1);
    }
    .filter-btn:hover {
      border-color: var(--accent-blue);
    }

    /* Detail panel */
    .detail-overlay {
      display: none;
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 420px;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      z-index: 100;
      overflow-y: auto;
      padding: 20px;
    }
    .detail-overlay.open { display: block; }
    .detail-close {
      position: absolute;
      top: 12px; right: 12px;
      background: none; border: none;
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      font-family: inherit;
    }
    .detail-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      padding-right: 30px;
    }
    .detail-section {
      margin-bottom: 16px;
    }
    .detail-section h4 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-secondary);
      margin: 0 0 8px 0;
    }
    .detail-section p, .detail-section div {
      font-size: 12px;
      line-height: 1.5;
    }
    .subtask-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }
    .subtask-item:last-child { border-bottom: none; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:12px;">
    <span style="font-size:18px;font-weight:700;">Zero Human Corp</span>
    <a href="/" style="font-size:11px;color:var(--text-secondary);text-decoration:none;padding:4px 10px;border:1px solid var(--border);border-radius:4px;">MISSION CONTROL</a>
    <span class="badge badge-purple">TASK BOARD</span>
  </div>
  <div style="display:flex;align-items:center;gap:6px;font-size:11px;">
    <span class="status-dot" id="ws-status"></span>
    <span id="ws-label">Connecting...</span>
    <span class="dim" style="margin-left:12px;" id="last-update"></span>
  </div>
</header>

<div class="stats-bar">
  <div style="display:flex;gap:16px;">
    <div class="stat"><span class="dim">Total:</span> <span id="s-total">0</span></div>
    <div class="stat"><span class="dim">Active:</span> <span class="yellow" id="s-active">0</span></div>
    <div class="stat"><span class="dim">Completed:</span> <span class="green" id="s-done">0</span></div>
  </div>
  <div class="filter-bar">
    <span class="dim">Filter:</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="ceo">Duke</button>
    <button class="filter-btn" data-filter="cto">Hackerman</button>
    <button class="filter-btn" data-filter="bizdev">Borat</button>
    <button class="filter-btn" data-filter="ops">T-800</button>
  </div>
</div>

<div class="kanban" id="kanban">
  <div class="kanban-column" data-status="INBOX">
    <div class="kanban-header"><h3>Inbox</h3><span class="kanban-count" id="c-INBOX">0</span></div>
    <div class="kanban-body" id="col-INBOX"></div>
  </div>
  <div class="kanban-column" data-status="ASSIGNED">
    <div class="kanban-header"><h3>Assigned</h3><span class="kanban-count" id="c-ASSIGNED">0</span></div>
    <div class="kanban-body" id="col-ASSIGNED"></div>
  </div>
  <div class="kanban-column" data-status="IN_PROGRESS">
    <div class="kanban-header"><h3>In Progress</h3><span class="kanban-count" id="c-IN_PROGRESS">0</span></div>
    <div class="kanban-body" id="col-IN_PROGRESS"></div>
  </div>
  <div class="kanban-column" data-status="IN_REVIEW">
    <div class="kanban-header"><h3>In Review</h3><span class="kanban-count" id="c-IN_REVIEW">0</span></div>
    <div class="kanban-body" id="col-IN_REVIEW"></div>
  </div>
  <div class="kanban-column" data-status="DONE">
    <div class="kanban-header"><h3>Done</h3><span class="kanban-count" id="c-DONE">0</span></div>
    <div class="kanban-body" id="col-DONE"></div>
  </div>
</div>

<!-- Task detail slide-in panel -->
<div class="detail-overlay" id="detail-panel">
  <button class="detail-close" id="detail-close">&times;</button>
  <div class="detail-title" id="d-title"></div>

  <div class="detail-section">
    <h4>Status</h4>
    <div><span class="badge" id="d-status"></span></div>
  </div>

  <div class="detail-section">
    <h4>Assignee</h4>
    <div id="d-assignee"></div>
  </div>

  <div class="detail-section">
    <h4>Priority</h4>
    <div id="d-priority"></div>
  </div>

  <div class="detail-section">
    <h4>Description</h4>
    <div id="d-description" style="white-space:pre-wrap;word-break:break-word;"></div>
  </div>

  <div class="detail-section">
    <h4>Subtasks</h4>
    <div id="d-subtasks"></div>
  </div>

  <div class="detail-section">
    <h4>Proof of Work</h4>
    <div id="d-proof" style="white-space:pre-wrap;word-break:break-word;"></div>
  </div>

  <div class="detail-section">
    <h4>Timeline</h4>
    <div id="d-timeline" class="dim"></div>
  </div>
</div>

<script>
  const AGENT_META = {
    ceo:    { name: 'Duke',      emoji: '\u{1F451}', color: 'purple' },
    cto:    { name: 'Hackerman', emoji: '\u{1F4BB}', color: 'green' },
    bizdev: { name: 'Borat',    emoji: '\u{1F44D}', color: 'blue' },
    ops:    { name: 'T-800',    emoji: '\u{1F916}', color: 'yellow' },
  };

  const STATUSES = ['INBOX', 'ASSIGNED', 'IN_PROGRESS', 'IN_REVIEW', 'DONE'];
  let allTasks = [];
  let currentFilter = 'all';

  // ---- WebSocket ----
  let ws;
  function connect() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}`);
    ws.onopen = () => {
      document.getElementById('ws-status').className = 'status-dot on';
      document.getElementById('ws-label').textContent = 'Connected';
    };
    ws.onclose = () => {
      document.getElementById('ws-status').className = 'status-dot off';
      document.getElementById('ws-label').textContent = 'Reconnecting...';
      setTimeout(connect, 3000);
    };
    ws.onerror = () => ws.close();
    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === 'full-state') {
        allTasks = (msg.data.board && msg.data.board.tasks) || [];
        render();
        document.getElementById('last-update').textContent =
          'Updated ' + new Date(msg.data.timestamp).toLocaleTimeString();
      }
    };
  }

  // ---- Render ----
  function render() {
    const filtered = currentFilter === 'all'
      ? allTasks
      : allTasks.filter(t => t.assignee === currentFilter || t.createdBy === currentFilter);

    // Stats
    const active = filtered.filter(t => !['DONE', 'ARCHIVED'].includes(t.status)).length;
    const done = filtered.filter(t => t.status === 'DONE' || t.status === 'ARCHIVED').length;
    document.getElementById('s-total').textContent = filtered.length;
    document.getElementById('s-active').textContent = active;
    document.getElementById('s-done').textContent = done;

    // Columns
    for (const status of STATUSES) {
      const col = document.getElementById('col-' + status);
      const tasks = filtered.filter(t => t.status === status);
      document.getElementById('c-' + status).textContent = tasks.length;

      if (tasks.length === 0) {
        col.innerHTML = '<div class="dim" style="font-size:11px;padding:8px;text-align:center;">No tasks</div>';
        continue;
      }

      col.innerHTML = tasks.map(t => {
        const agent = AGENT_META[t.assignee] || { name: t.assignee || 'Unassigned', emoji: '?', color: 'dim' };
        const subtasks = t.subtasks || [];
        const subtasksDone = subtasks.filter(s => s.status === 'DONE').length;
        const subtaskPct = subtasks.length > 0 ? (subtasksDone / subtasks.length * 100) : 0;
        const priorityColor = { critical: 'red', high: 'yellow', medium: 'blue', low: 'dim' }[t.priority] || 'dim';

        return `
          <div class="task-card" data-id="${esc(t.id)}" onclick="showDetail('${esc(t.id)}')">
            <div class="task-card-title">${esc(t.title)}</div>
            <div class="task-card-meta">
              <div class="task-card-agent">
                <span>${agent.emoji}</span>
                <span class="badge badge-${agent.color}">${esc(agent.name)}</span>
              </div>
              <span class="badge badge-${priorityColor}">${esc(t.priority || 'normal')}</span>
            </div>
            ${subtasks.length > 0 ? `
              <div class="subtask-bar">
                <div class="subtask-bar-fill" style="width:${subtaskPct}%"></div>
              </div>
              <div class="dim" style="font-size:9px;margin-top:3px;">${subtasksDone}/${subtasks.length} subtasks</div>
            ` : ''}
          </div>
        `;
      }).join('');
    }
  }

  // ---- Detail panel ----
  function showDetail(id) {
    const task = allTasks.find(t => t.id === id);
    if (!task) return;

    const agent = AGENT_META[task.assignee] || { name: task.assignee || 'Unassigned', emoji: '?', color: 'dim' };
    const statusColor = { INBOX: 'blue', ASSIGNED: 'blue', IN_PROGRESS: 'yellow', IN_REVIEW: 'purple', DONE: 'green', ARCHIVED: 'green' }[task.status] || 'blue';
    const priorityColor = { critical: 'red', high: 'yellow', medium: 'blue', low: 'dim' }[task.priority] || 'dim';

    document.getElementById('d-title').textContent = task.title;

    const statusEl = document.getElementById('d-status');
    statusEl.textContent = task.status;
    statusEl.className = 'badge badge-' + statusColor;

    document.getElementById('d-assignee').innerHTML =
      `${agent.emoji} <span class="badge badge-${agent.color}">${esc(agent.name)}</span>` +
      (task.createdBy ? ` <span class="dim" style="font-size:10px;margin-left:6px;">created by ${esc(task.createdBy)}</span>` : '');

    const prioEl = document.getElementById('d-priority');
    prioEl.innerHTML = `<span class="badge badge-${priorityColor}">${esc(task.priority || 'normal')}</span>` +
      (task.budget ? ` <span class="dim" style="font-size:10px;margin-left:6px;">budget: $${task.budget}</span>` : '');

    document.getElementById('d-description').textContent = task.description || 'No description';

    // Subtasks
    const subtaskEl = document.getElementById('d-subtasks');
    const subtasks = task.subtasks || [];
    if (subtasks.length === 0) {
      subtaskEl.innerHTML = '<div class="dim" style="font-size:11px;">No subtasks</div>';
    } else {
      subtaskEl.innerHTML = subtasks.map(s => {
        const sColor = s.status === 'DONE' ? 'green' : s.status === 'IN_PROGRESS' ? 'yellow' : 'dim';
        return `<div class="subtask-item">
          <span>${esc(s.title)}</span>
          <span class="badge badge-${sColor}">${esc(s.status)}</span>
        </div>`;
      }).join('');
    }

    // Proof of work
    const proofEl = document.getElementById('d-proof');
    if (task.proofOfWork) {
      proofEl.textContent = typeof task.proofOfWork === 'string' ? task.proofOfWork : JSON.stringify(task.proofOfWork, null, 2);
    } else {
      proofEl.innerHTML = '<span class="dim" style="font-size:11px;">Not yet submitted</span>';
    }

    // Timeline
    const timeEl = document.getElementById('d-timeline');
    const lines = [];
    if (task.createdAt) lines.push('Created: ' + new Date(task.createdAt).toLocaleString());
    if (task.deadline) lines.push('Deadline: ' + new Date(task.deadline).toLocaleString());
    if (task.completedAt) lines.push('Completed: ' + new Date(task.completedAt).toLocaleString());
    timeEl.innerHTML = lines.length > 0
      ? lines.map(l => `<div style="font-size:11px;">${esc(l)}</div>`).join('')
      : '<div style="font-size:11px;">No timeline data</div>';

    document.getElementById('detail-panel').classList.add('open');
  }

  document.getElementById('detail-close').addEventListener('click', () => {
    document.getElementById('detail-panel').classList.remove('open');
  });

  // ---- Filter buttons ----
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  // ---- Helpers ----
  function esc(s) {
    if (s == null) return '';
    const d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
  }

  // ---- Init ----
  connect();

  // Fallback polling
  setInterval(async () => {
    if (!ws || ws.readyState !== 1) {
      try {
        const res = await fetch('/api/state');
        const data = await res.json();
        allTasks = (data.board && data.board.tasks) || [];
        render();
      } catch {}
    }
  }, 15000);
</script>

</body>
</html>

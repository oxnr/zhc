<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZHC — Task Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --dim: #666666;
      --border: #000000;
      --shadow: 6px 6px 0 #000;
      --shadow-sm: 4px 4px 0 #000;
      --green: #06D6A0;
      --red: #EF476F;
      --yellow: #FFD166;
      --blue: #118AB2;
      --purple: #7B2D8E;
      --teal: #073B4C;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 3px solid var(--border);
      background: var(--yellow);
    }
    header .brand {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .nav-link {
      display: inline-block;
      padding: 6px 14px;
      border: 3px solid var(--border);
      box-shadow: var(--shadow-sm);
      background: var(--card);
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
      letter-spacing: 1px;
    }
    .nav-link:hover {
      box-shadow: 2px 2px 0 #000;
      transform: translate(2px, 2px);
    }
    .nav-link.active {
      background: var(--teal);
      color: #fff;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border: 2px solid var(--border);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-green { background: var(--green); }
    .badge-red { background: var(--red); color: #fff; }
    .badge-yellow { background: var(--yellow); }
    .badge-blue { background: var(--blue); color: #fff; }
    .badge-purple { background: var(--purple); color: #fff; }
    .badge-dim { background: #ddd; }
    .status-dot {
      width: 10px; height: 10px;
      border: 2px solid var(--border);
      display: inline-block;
    }
    .status-dot.on { background: var(--green); }
    .status-dot.off { background: var(--red); }
    .dim { color: var(--dim); }

    /* Stats bar */
    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 3px solid var(--border);
      background: var(--card);
      font-size: 12px;
    }
    .stat { display: flex; align-items: center; gap: 6px; font-weight: 600; }

    /* Filter buttons */
    .filter-bar { display: flex; gap: 6px; align-items: center; }
    .filter-btn {
      padding: 5px 12px;
      border: 3px solid var(--border);
      box-shadow: 3px 3px 0 #000;
      background: var(--card);
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    .filter-btn:hover {
      box-shadow: 1px 1px 0 #000;
      transform: translate(2px, 2px);
    }
    .filter-btn.active {
      background: var(--teal);
      color: #fff;
    }

    /* Kanban */
    .kanban {
      display: flex;
      gap: 16px;
      padding: 20px;
      overflow-x: auto;
      min-height: calc(100vh - 120px);
      align-items: flex-start;
    }
    .kanban-column {
      flex: 1;
      min-width: 230px;
      max-width: 320px;
      border: 3px solid var(--border);
      box-shadow: var(--shadow);
      background: var(--card);
    }
    .kanban-header {
      padding: 12px 14px;
      border-bottom: 3px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
    }
    .kanban-header h3 {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .kanban-count {
      font-size: 12px;
      font-weight: 700;
      background: var(--yellow);
      border: 2px solid var(--border);
      padding: 1px 8px;
    }
    .kanban-body {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      max-height: calc(100vh - 220px);
    }

    /* Task cards */
    .task-card {
      border: 3px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 12px 14px;
      background: var(--card);
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .task-card:hover {
      box-shadow: 2px 2px 0 #000;
      transform: translate(2px, 2px);
      background: #fafafa;
    }
    .task-card-title {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .task-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
    }
    .task-card-agent {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .subtask-bar {
      height: 4px;
      background: #eee;
      border: 1px solid var(--border);
      margin-top: 10px;
      overflow: hidden;
    }
    .subtask-bar-fill {
      height: 100%;
      background: var(--green);
      transition: width 0.3s;
    }

    /* Detail panel */
    .detail-overlay {
      display: none;
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 440px;
      background: var(--card);
      border-left: 3px solid var(--border);
      box-shadow: -6px 0 0 var(--border);
      z-index: 100;
      overflow-y: auto;
      padding: 24px;
    }
    .detail-overlay.open { display: block; }
    .detail-close {
      position: absolute;
      top: 12px; right: 12px;
      background: var(--red);
      border: 3px solid var(--border);
      box-shadow: 3px 3px 0 #000;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .detail-close:hover {
      box-shadow: 1px 1px 0 #000;
      transform: translate(2px, 2px);
    }
    .detail-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      padding-right: 40px;
      padding-bottom: 12px;
      border-bottom: 3px solid var(--border);
    }
    .detail-section {
      margin-bottom: 18px;
    }
    .detail-section h4 {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--dim);
      margin: 0 0 8px 0;
    }
    .detail-section p, .detail-section div {
      font-size: 12px;
      line-height: 1.6;
    }
    .subtask-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 2px solid #eee;
      font-size: 11px;
    }
    .subtask-item:last-child { border-bottom: none; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:14px;">
    <span class="brand">ZHC</span>
    <a href="/" class="nav-link">MISSION CONTROL</a>
    <span class="nav-link active">TASK BOARD</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;">
    <span class="status-dot" id="ws-status"></span>
    <span id="ws-label">Connecting...</span>
    <span class="dim" style="margin-left:12px;" id="last-update"></span>
  </div>
</header>

<div class="stats-bar">
  <div style="display:flex;gap:20px;">
    <div class="stat"><span class="dim">Total:</span> <span id="s-total">0</span></div>
    <div class="stat"><span class="dim">Active:</span> <span style="color:var(--blue)" id="s-active">0</span></div>
    <div class="stat"><span class="dim">Done:</span> <span style="color:var(--green)" id="s-done">0</span></div>
  </div>
  <div class="filter-bar">
    <span class="dim" style="font-size:11px;font-weight:600;">Filter:</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="ceo">Duke</button>
    <button class="filter-btn" data-filter="cto">Hackerman</button>
    <button class="filter-btn" data-filter="bizdev">Borat</button>
    <button class="filter-btn" data-filter="ops">T-800</button>
    <button class="filter-btn" data-filter="content">Don Draper</button>
    <button class="filter-btn" data-filter="designer">Picasso</button>
  </div>
</div>

<div class="kanban" id="kanban">
  <div class="kanban-column" data-status="INBOX">
    <div class="kanban-header"><h3>Inbox</h3><span class="kanban-count" id="c-INBOX">0</span></div>
    <div class="kanban-body" id="col-INBOX"></div>
  </div>
  <div class="kanban-column" data-status="ASSIGNED">
    <div class="kanban-header"><h3>Assigned</h3><span class="kanban-count" id="c-ASSIGNED">0</span></div>
    <div class="kanban-body" id="col-ASSIGNED"></div>
  </div>
  <div class="kanban-column" data-status="IN_PROGRESS">
    <div class="kanban-header"><h3>In Progress</h3><span class="kanban-count" id="c-IN_PROGRESS">0</span></div>
    <div class="kanban-body" id="col-IN_PROGRESS"></div>
  </div>
  <div class="kanban-column" data-status="IN_REVIEW">
    <div class="kanban-header"><h3>In Review</h3><span class="kanban-count" id="c-IN_REVIEW">0</span></div>
    <div class="kanban-body" id="col-IN_REVIEW"></div>
  </div>
  <div class="kanban-column" data-status="DONE">
    <div class="kanban-header"><h3>Done</h3><span class="kanban-count" id="c-DONE">0</span></div>
    <div class="kanban-body" id="col-DONE"></div>
  </div>
</div>

<!-- Task detail panel -->
<div class="detail-overlay" id="detail-panel">
  <button class="detail-close" id="detail-close">&times;</button>
  <div class="detail-title" id="d-title"></div>
  <div class="detail-section"><h4>Status</h4><div><span class="badge" id="d-status"></span></div></div>
  <div class="detail-section"><h4>Assignee</h4><div id="d-assignee"></div></div>
  <div class="detail-section"><h4>Priority</h4><div id="d-priority"></div></div>
  <div class="detail-section"><h4>Description</h4><div id="d-description" style="white-space:pre-wrap;word-break:break-word;"></div></div>
  <div class="detail-section"><h4>Subtasks</h4><div id="d-subtasks"></div></div>
  <div class="detail-section"><h4>Proof of Work</h4><div id="d-proof" style="white-space:pre-wrap;word-break:break-word;"></div></div>
  <div class="detail-section"><h4>Timeline</h4><div id="d-timeline" class="dim"></div></div>
</div>

<script>
  const AGENT_META = {
    ceo:      { name: 'Duke',       emoji: '\u{1F451}', color: 'purple' },
    cto:      { name: 'Hackerman',  emoji: '\u{1F4BB}', color: 'green' },
    bizdev:   { name: 'Borat',      emoji: '\u{1F44D}', color: 'blue' },
    ops:      { name: 'T-800',      emoji: '\u{1F916}', color: 'yellow' },
    content:  { name: 'Don Draper', emoji: '\u{1F4DD}', color: 'blue' },
    designer: { name: 'Picasso',    emoji: '\u{1F3A8}', color: 'green' },
  };
  const STATUSES = ['INBOX', 'ASSIGNED', 'IN_PROGRESS', 'IN_REVIEW', 'DONE'];
  let allTasks = [];
  let currentFilter = 'all';

  let ws;
  function connect() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}`);
    ws.onopen = () => {
      document.getElementById('ws-status').className = 'status-dot on';
      document.getElementById('ws-label').textContent = 'Connected';
    };
    ws.onclose = () => {
      document.getElementById('ws-status').className = 'status-dot off';
      document.getElementById('ws-label').textContent = 'Reconnecting...';
      setTimeout(connect, 3000);
    };
    ws.onerror = () => ws.close();
    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === 'full-state') {
        allTasks = (msg.data.board && msg.data.board.tasks) || [];
        render();
        document.getElementById('last-update').textContent =
          'Updated ' + new Date(msg.data.timestamp).toLocaleTimeString();
      }
    };
  }

  function render() {
    const filtered = currentFilter === 'all'
      ? allTasks
      : allTasks.filter(t => t.assignee === currentFilter || t.createdBy === currentFilter);

    const active = filtered.filter(t => !['DONE', 'ARCHIVED'].includes(t.status)).length;
    const done = filtered.filter(t => t.status === 'DONE' || t.status === 'ARCHIVED').length;
    document.getElementById('s-total').textContent = filtered.length;
    document.getElementById('s-active').textContent = active;
    document.getElementById('s-done').textContent = done;

    for (const status of STATUSES) {
      const col = document.getElementById('col-' + status);
      const tasks = filtered.filter(t => t.status === status);
      document.getElementById('c-' + status).textContent = tasks.length;

      if (tasks.length === 0) {
        col.innerHTML = '<div class="dim" style="font-size:11px;padding:12px;text-align:center;">No tasks</div>';
        continue;
      }

      col.innerHTML = tasks.map(t => {
        const agent = AGENT_META[t.assignee] || { name: t.assignee || 'Unassigned', emoji: '?', color: 'dim' };
        const subtasks = t.subtasks || [];
        const subtasksDone = subtasks.filter(s => s.status === 'DONE').length;
        const subtaskPct = subtasks.length > 0 ? (subtasksDone / subtasks.length * 100) : 0;
        const priorityColor = { critical: 'red', high: 'yellow', medium: 'blue', low: 'dim' }[t.priority] || 'dim';

        return `
          <div class="task-card" onclick="showDetail('${esc(t.id)}')">
            <div class="task-card-title">${esc(t.title)}</div>
            <div class="task-card-meta">
              <div class="task-card-agent">
                <span>${agent.emoji}</span>
                <span class="badge badge-${agent.color}">${esc(agent.name)}</span>
              </div>
              <span class="badge badge-${priorityColor}">${esc(t.priority || 'normal')}</span>
            </div>
            ${subtasks.length > 0 ? `
              <div class="subtask-bar">
                <div class="subtask-bar-fill" style="width:${subtaskPct}%"></div>
              </div>
              <div class="dim" style="font-size:9px;margin-top:4px;">${subtasksDone}/${subtasks.length} subtasks</div>
            ` : ''}
          </div>
        `;
      }).join('');
    }
  }

  function showDetail(id) {
    const task = allTasks.find(t => t.id === id);
    if (!task) return;

    const agent = AGENT_META[task.assignee] || { name: task.assignee || 'Unassigned', emoji: '?', color: 'dim' };
    const statusColor = { INBOX: 'blue', ASSIGNED: 'blue', IN_PROGRESS: 'yellow', IN_REVIEW: 'purple', DONE: 'green', ARCHIVED: 'green' }[task.status] || 'blue';
    const priorityColor = { critical: 'red', high: 'yellow', medium: 'blue', low: 'dim' }[task.priority] || 'dim';

    document.getElementById('d-title').textContent = task.title;

    const statusEl = document.getElementById('d-status');
    statusEl.textContent = task.status;
    statusEl.className = 'badge badge-' + statusColor;

    document.getElementById('d-assignee').innerHTML =
      `${agent.emoji} <span class="badge badge-${agent.color}">${esc(agent.name)}</span>` +
      (task.createdBy ? ` <span class="dim" style="font-size:10px;margin-left:6px;">created by ${esc(task.createdBy)}</span>` : '');

    document.getElementById('d-priority').innerHTML =
      `<span class="badge badge-${priorityColor}">${esc(task.priority || 'normal')}</span>` +
      (task.budget ? ` <span class="dim" style="font-size:10px;margin-left:6px;">budget: $${task.budget}</span>` : '');

    document.getElementById('d-description').textContent = task.description || 'No description';

    const subtaskEl = document.getElementById('d-subtasks');
    const subtasks = task.subtasks || [];
    if (subtasks.length === 0) {
      subtaskEl.innerHTML = '<div class="dim" style="font-size:11px;">No subtasks</div>';
    } else {
      subtaskEl.innerHTML = subtasks.map(s => {
        const sColor = s.status === 'DONE' ? 'green' : s.status === 'IN_PROGRESS' ? 'yellow' : 'dim';
        return `<div class="subtask-item">
          <span>${esc(s.title)}</span>
          <span class="badge badge-${sColor}">${esc(s.status)}</span>
        </div>`;
      }).join('');
    }

    const proofEl = document.getElementById('d-proof');
    if (task.proofOfWork) {
      proofEl.textContent = typeof task.proofOfWork === 'string' ? task.proofOfWork : JSON.stringify(task.proofOfWork, null, 2);
    } else {
      proofEl.innerHTML = '<span class="dim" style="font-size:11px;">Not yet submitted</span>';
    }

    const timeEl = document.getElementById('d-timeline');
    const lines = [];
    if (task.createdAt) lines.push('Created: ' + new Date(task.createdAt).toLocaleString());
    if (task.deadline) lines.push('Deadline: ' + new Date(task.deadline).toLocaleString());
    if (task.completedAt) lines.push('Completed: ' + new Date(task.completedAt).toLocaleString());
    timeEl.innerHTML = lines.length > 0
      ? lines.map(l => `<div style="font-size:11px;">${esc(l)}</div>`).join('')
      : '<div style="font-size:11px;">No timeline data</div>';

    document.getElementById('detail-panel').classList.add('open');
  }

  document.getElementById('detail-close').addEventListener('click', () => {
    document.getElementById('detail-panel').classList.remove('open');
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  function esc(s) {
    if (s == null) return '';
    const d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
  }

  connect();
  setInterval(async () => {
    if (!ws || ws.readyState !== 1) {
      try {
        const res = await fetch('/api/state');
        const data = await res.json();
        allTasks = (data.board && data.board.tasks) || [];
        render();
      } catch {}
    }
  }, 15000);
</script>

</body>
</html>

version: "3.9"

# ============================================
# Zero Human Corp — Single Container
# ============================================
# Everything runs in one container: dashboard, tracker, agents.
#
# Usage:
#   docker compose up -d          # Start
#   docker compose logs -f        # Watch logs
#   docker compose down           # Stop
#   docker compose up --build     # Rebuild and start

services:
  zhc:
    build: .
    ports:
      - "${DASHBOARD_PORT:-4200}:4200"
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    volumes:
      # Persistent state
      - ./memory:/zhc/memory
      - ./economy:/zhc/economy
      - ./symphony:/zhc/symphony
      # CLI auth (read-only)
      - ~/.claude:/root/.claude:ro
      - ~/.codex:/root/.codex:ro
      # OpenClaw state
      - ~/.openclaw:/root/.openclaw
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4200/api/state"]
      interval: 30s
      timeout: 5s
      retries: 3
